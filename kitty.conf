# vim:fileencoding=utf-8:foldmethod=marker

# BEGIN_KITTY_THEME
# Pastel EGA
include current-theme.conf
# END_KITTY_THEME

# Window
confirm_os_window_close 0 
remember_window_size no
initial_window_width 870
initial_window_height 400
background_opacity 0.7

# Tab bar
tab_bar_margin_width 4.0
tab_bar_margin_height 4.0 4.0
tab_bar_style powerline
tab_bar_min_tabs 1

# Keybinds
map ctrl+e new_tab_with_cwd
map ctrl+q new_tab
map ctrl+w close_tab
map ctrl+d next_tab
map ctrl+s previous_tab

# Fixes starship not showing pwd
# Kitty use interactive shell
shell . 
# Starship eval
eval "$(starship init bash)"

# Font
font_size 10.0 


# BEGIN_KITTY_FONTS
font_family      family="0xProto Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
